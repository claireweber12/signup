<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="left-text">
                <img src="./images/odin-image.png", alt="Odin Logo">
                <h1 class="odin">ODIN</h1> 
            </div>
            <p class="img-credit"></p>
        </div>
        <div class="right">
            <div class="right-text">
                <p class = top-text">This is not a real online service! You know you need someting 
                like this in your life to help you realize your deepest dreams.
                Sign up now to get started.</p>
                <p class="lower-text">You <em>know</em> you want to.</p>
            </div>
            <form action="example.com/path" method="post">
                <div class="form-group">
                    <label for="first_name">First Name:</label>
                    <input type="text" id="first_name" name="first_name">
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name:</label>
                    <input type="text" id="last_name" name="last_name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="phone_num">Phone Number</label>
                    <input type="number" id="phone_num" name="phone_num">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="form-group">
                    <label for="confirm-pass">Confirm Password</label>
                    <input type="password" id="confirm-pass" name="confirm_pass">
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>  
</body>
</html>
